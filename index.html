<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Basketball Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Rajdhani', sans-serif;
}

/* ===== MAIN BOARD ===== */
.board {
  width: 100vw;
  height: 100vh;
  background: #000;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ===== TOP BAR ===== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  position: relative;
}

.top-icon-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #fff;
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 20px;
  flex-shrink: 0;
}

.top-center {
  display: flex;
  align-items: center;
  gap: 16px;
  flex: 1;
  justify-content: center;
}

.play-btn {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 22px;
  flex-shrink: 0;
}

.main-clock {
  font-family: 'Orbitron', monospace;
  font-size: clamp(32px, 9vw, 64px);
  font-weight: 900;
  color: #ff2200;
  text-shadow: 0 0 20px #ff220066;
  letter-spacing: 4px;
  line-height: 1;
}

.quarter-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(18px, 5vw, 32px);
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
}

.top-right-icons {
  display: flex; gap: 8px;
}

/* ===== MAIN CONTENT ===== */
.main-content {
  flex: 1;
  display: flex;
  align-items: stretch;
  padding: 0 8px;
  gap: 6px;
  min-height: 0;
}

/* ===== SIDE BUTTONS (+1 +2 +3) ===== */
.side-btns {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 4px 0;
}

.side-score-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #fff;
  border: none;
  color: #000;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Rajdhani', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(255,255,255,0.2);
}

/* ===== CENTER AREA ===== */
.center-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0;
  min-width: 0;
}

/* Team name + score block */
.team-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.team-name-btn {
  background: transparent;
  border: none;
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(18px, 5vw, 28px);
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
}

.team-name-btn:active { opacity: 0.7; }

.digit-score {
  font-family: 'Orbitron', monospace;
  font-size: clamp(50px, 15vw, 110px);
  font-weight: 900;
  color: #00ff44;
  text-shadow: 0 0 30px #00ff4466, 0 0 60px #00ff4422;
  line-height: 1;
  /* 7-segment style */
  -webkit-font-smoothing: antialiased;
}

/* Teams row */
.teams-row {
  display: flex;
  width: 100%;
  justify-content: space-between;
  align-items: center;
  flex: 1;
}

/* Fouls dots display */
.fouls-dots-area {
  display: flex;
  width: 100%;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
}

.fouls-dots-btn {
  background: transparent;
  border: 2px solid #888;
  border-radius: 20px;
  padding: 4px 10px;
  display: flex; gap: 5px;
  cursor: pointer;
  align-items: center;
}

.foul-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #555;
}

.foul-dot.active { background: #fff; }

/* Fouls center label */
.fouls-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.fouls-label {
  color: #cc0000;
  font-size: clamp(14px, 4vw, 22px);
  font-weight: 700;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.fouls-arrow {
  color: #cc0000;
  font-size: 18px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0 4px;
  line-height: 1;
}

/* Shot clock + fouls row */
.bottom-row {
  display: flex;
  width: 100%;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px 4px;
}

.shot-area {
  display: flex;
  align-items: center;
  gap: 8px;
}

.shot-add-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: #fff;
  border: none;
  color: #000;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.shot-display {
  display: flex;
  align-items: center;
  gap: 6px;
}

.shot-digit {
  font-family: 'Orbitron', monospace;
  font-size: clamp(24px, 7vw, 50px);
  font-weight: 900;
  line-height: 1;
}

.shot-digit.left { color: #ff0; }
.shot-digit.right { color: #ff8800; }

.shot-x {
  color: #fff;
  font-size: clamp(18px, 5vw, 36px);
  font-weight: 700;
}

/* Bottom icons */
.bottom-icons {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 6px 10px;
}

.bottom-icon-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #fff;
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 20px;
}

/* Divider line */
.divider {
  width: 60%;
  height: 3px;
  background: #fff;
  border-radius: 2px;
  margin: 0 auto 4px;
}

/* ===== MODAL for team name edit ===== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal-box {
  background: #1a1a1a;
  border: 2px solid #fff;
  border-radius: 16px;
  padding: 24px;
  width: 80%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.modal-box h3 { color: #fff; font-size: 20px; text-align: center; }

.modal-input {
  background: #333;
  border: 1px solid #666;
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  padding: 10px;
  width: 100%;
  text-align: center;
  font-family: 'Rajdhani', sans-serif;
  -webkit-user-select: auto;
  user-select: auto;
  touch-action: auto;
}

.modal-btn {
  background: #fff;
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
}

/* ===== CONFIRM RESET MODAL ===== */
.confirm-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}

.confirm-modal.show { display: flex; }
.confirm-modal p { color: #fff; font-size: 22px; font-weight: 700; }

.confirm-btns { display: flex; gap: 16px; }
.confirm-yes { background: #e74c3c; color: #fff; border: none; border-radius: 10px; padding: 14px 30px; font-size: 18px; font-weight: 700; cursor: pointer; }
.confirm-no { background: #555; color: #fff; border: none; border-radius: 10px; padding: 14px 30px; font-size: 18px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="board">

  <!-- TOP BAR -->
  <div class="top-bar">
    <button class="top-icon-btn" onclick="resetMatch()">🏀</button>
    
    <div class="top-center">
      <button class="play-btn" id="playPauseBtn" onclick="toggleTimer()">▶</button>
      <div class="main-clock" id="mainTimer">10:00</div>
      <div class="quarter-label" id="quarterLabel">1st</div>
    </div>

    <div class="top-right-icons">
      <button class="top-icon-btn" onclick="openTeamEdit()">✏️</button>
      <button class="top-icon-btn" onclick="showOptions()">⋯</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- LEFT: +1 +2 +3 for Team 1 -->
    <div class="side-btns">
      <button class="side-score-btn" onclick="addScore(1,1)">+1</button>
      <button class="side-score-btn" onclick="addScore(1,2)">+2</button>
      <button class="side-score-btn" onclick="addScore(1,3)">+3</button>
    </div>

    <!-- CENTER -->
    <div class="center-area">

      <!-- Teams + Scores -->
      <div class="teams-row">
        <div class="team-block">
          <button class="team-name-btn" onclick="editTeam(1)" id="team1Title">Team 1</button>
          <div class="digit-score" id="s1">0</div>
        </div>

        <!-- Middle X icon (decorative) -->
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">
          <svg width="50" height="60" viewBox="0 0 50 60" fill="none">
            <line x1="5" y1="5" x2="45" y2="55" stroke="white" stroke-width="6" stroke-linecap="round"/>
            <line x1="45" y1="5" x2="5" y2="55" stroke="white" stroke-width="6" stroke-linecap="round"/>
          </svg>
        </div>

        <div class="team-block">
          <button class="team-name-btn" onclick="editTeam(2)" id="team2Title">Team 2</button>
          <div class="digit-score" id="s2">0</div>
        </div>
      </div>

      <!-- Fouls Dots + Label -->
      <div class="fouls-dots-area">
        <!-- Team 1 fouls dots -->
        <button class="fouls-dots-btn" onclick="addFoul(1)" id="foulDots1">
          <div class="foul-dot" id="fd1_1"></div>
          <div class="foul-dot" id="fd1_2"></div>
          <div class="foul-dot" id="fd1_3"></div>
          <div class="foul-dot" id="fd1_4"></div>
        </button>

        <!-- Center fouls label -->
        <div class="fouls-center">
          <div class="fouls-label">
            <button class="fouls-arrow" onclick="subtractFoul(1)">◀</button>
            Fouls
            <button class="fouls-arrow" onclick="subtractFoul(2)">▶</button>
          </div>
        </div>

        <!-- Team 2 fouls dots -->
        <button class="fouls-dots-btn" onclick="addFoul(2)" id="foulDots2">
          <div class="foul-dot" id="fd2_1"></div>
          <div class="foul-dot" id="fd2_2"></div>
          <div class="foul-dot" id="fd2_3"></div>
          <div class="foul-dot" id="fd2_4"></div>
        </button>
      </div>

      <!-- Shot clock row -->
      <div class="bottom-row">
        <button class="shot-add-btn" onclick="addFoul(1)" style="background:#fff;">+</button>
        
        <div class="shot-display">
          <div class="shot-digit left" id="shot1">0</div>
          <div class="shot-x">x</div>
          <div class="shot-digit right" id="shot2">2</div>
        </div>

        <button class="shot-add-btn" onclick="addFoul(2)" style="background:#fff;">+</button>
      </div>

    </div>

    <!-- RIGHT: +1 +2 +3 for Team 2 -->
    <div class="side-btns">
      <button class="side-score-btn" onclick="addScore(2,1)">+1</button>
      <button class="side-score-btn" onclick="addScore(2,2)">+2</button>
      <button class="side-score-btn" onclick="addScore(2,3)">+3</button>
    </div>

  </div>

  <!-- BOTTOM -->
  <div class="divider"></div>
  <div class="bottom-icons">
    <button class="bottom-icon-btn" onclick="resetShot()">⏱</button>
    <button class="bottom-icon-btn" onclick="undoAction()">🔔</button>
  </div>

</div>

<!-- TEAM NAME EDIT MODAL -->
<div class="modal-overlay" id="teamModal">
  <div class="modal-box">
    <h3 id="modalTitle">Edit Team Name</h3>
    <input type="text" class="modal-input" id="teamNameInput" placeholder="Enter name...">
    <button class="modal-btn" onclick="saveTeamName()">Save</button>
    <button class="modal-btn" style="background:#333;color:#fff;" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- OPTIONS MODAL -->
<div class="modal-overlay" id="optionsModal">
  <div class="modal-box">
    <h3>Options</h3>
    <button class="modal-btn" onclick="prevQuarter();closeOptions()">◀ Prev Quarter</button>
    <button class="modal-btn" onclick="nextQuarter();closeOptions()">Next Quarter ▶</button>
    <button class="modal-btn" onclick="resetMain();closeOptions()">Reset Quarter Timer</button>
    <button class="modal-btn" style="background:#e74c3c;color:#fff;" onclick="closeOptions();resetMatch()">Reset Match</button>
    <button class="modal-btn" style="background:#333;color:#fff;" onclick="closeOptions()">Close</button>
  </div>
</div>

<!-- CONFIRM RESET -->
<div class="confirm-modal" id="confirmModal">
  <p>Reset the whole match?</p>
  <div class="confirm-btns">
    <button class="confirm-yes" onclick="doReset()">Yes, Reset</button>
    <button class="confirm-no" onclick="document.getElementById('confirmModal').classList.remove('show')">Cancel</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Prevent zoom
document.addEventListener('touchmove', e => { if (e.scale !== 1) e.preventDefault(); }, { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, false);
document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDr78eta_v2AOxrll2mTX8noI805qPtifA",
  authDomain: "ok-new-7c868.firebaseapp.com",
  databaseURL: "https://ok-new-7c868-default-rtdb.firebaseio.com",
  projectId: "ok-new-7c868",
  storageBucket: "ok-new-7c868.firebasestorage.app",
  messagingSenderId: "760753992927",
  appId: "1:760753992927:web:8702569c9c7c45be7fe56a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Constants
const QUARTER_DURATION = 600;
const QUARTER_NAMES = ['1st','2nd','3rd','4th'];

// State
function loadState() {
  try { const s = localStorage.getItem('bbGame2'); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
}
const sv = loadState();

let mainRemaining = sv.mainRemaining ?? QUARTER_DURATION;
let score1 = sv.score1 ?? 0;
let score2 = sv.score2 ?? 0;
let foul1 = sv.foul1 ?? 0;
let foul2 = sv.foul2 ?? 0;
let currentQuarter = sv.currentQuarter ?? 1;
let team1Name = sv.team1Name ?? 'Team 1';
let team2Name = sv.team2Name ?? 'Team 2';
let isRunning = false;

let lastScore1 = score1, lastScore2 = score2;
let mainLastUpdate = Date.now();
let editingTeam = 0;

// Save
function saveState() {
  try {
    localStorage.setItem('bbGame2', JSON.stringify({ mainRemaining, score1, score2, foul1, foul2, currentQuarter, team1Name, team2Name }));
  } catch(e) {}
}

function updateDB() {
  db.ref("game").set({ main: mainRemaining, team1: score1, team2: score2, fouls1: foul1, fouls2: foul2, quarter: currentQuarter, team1Name, team2Name, isRunning });
  saveState();
}

// Timer loop
function loop() {
  if (isRunning) {
    const now = Date.now();
    const elapsed = Math.floor((now - mainLastUpdate) / 1000);
    if (elapsed > 0) {
      mainRemaining = Math.max(0, mainRemaining - elapsed);
      mainLastUpdate = now;
      renderTimer();
      updateDB();
      if (mainRemaining === 0) { isRunning = false; updatePlayBtn(); }
    }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Format
function fmt(t) {
  return Math.floor(t/60) + ':' + String(t%60).padStart(2,'0');
}

// Renders
function renderTimer() {
  document.getElementById('mainTimer').textContent = fmt(mainRemaining);
}

function renderQuarter() {
  document.getElementById('quarterLabel').textContent = QUARTER_NAMES[currentQuarter-1];
}

function updatePlayBtn() {
  document.getElementById('playPauseBtn').textContent = isRunning ? '⏸' : '▶';
}

function renderScores() {
  document.getElementById('s1').textContent = score1;
  document.getElementById('s2').textContent = score2;
}

function renderFouls() {
  // Update dots for team 1
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById('fd1_' + i);
    if (dot) dot.classList.toggle('active', i <= foul1);
  }
  // Update dots for team 2
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById('fd2_' + i);
    if (dot) dot.classList.toggle('active', i <= foul2);
  }
  // Shot display shows fouls
  document.getElementById('shot1').textContent = foul1;
  document.getElementById('shot2').textContent = foul2;
}

function renderTeams() {
  document.getElementById('team1Title').textContent = team1Name;
  document.getElementById('team2Title').textContent = team2Name;
}

// Controls
function toggleTimer() {
  isRunning = !isRunning;
  if (isRunning) mainLastUpdate = Date.now();
  updatePlayBtn();
  updateDB();
}

function addScore(team, pts) {
  if (team === 1) { lastScore1 = score1; score1 += pts; }
  else { lastScore2 = score2; score2 += pts; }
  renderScores();
  updateDB();
}

function undoAction() {
  score1 = lastScore1;
  score2 = lastScore2;
  renderScores();
  updateDB();
}

function addFoul(team) {
  if (team === 1) foul1 = Math.min(foul1 + 1, 4);
  else foul2 = Math.min(foul2 + 1, 4);
  renderFouls(); updateDB();
}

function subtractFoul(team) {
  if (team === 1) foul1 = Math.max(0, foul1 - 1);
  else foul2 = Math.max(0, foul2 - 1);
  renderFouls(); updateDB();
}

function nextQuarter() {
  if (currentQuarter < 4) {
    isRunning = false; updatePlayBtn();
    currentQuarter++;
    mainRemaining = QUARTER_DURATION;
    renderTimer(); renderQuarter(); updateDB();
  }
}

function prevQuarter() {
  if (currentQuarter > 1) {
    isRunning = false; updatePlayBtn();
    currentQuarter--;
    mainRemaining = QUARTER_DURATION;
    renderTimer(); renderQuarter(); updateDB();
  }
}

function resetMain() {
  isRunning = false; updatePlayBtn();
  mainRemaining = QUARTER_DURATION;
  renderTimer(); updateDB();
}

function resetShot() {
  // Just a buzzer action placeholder
}

// Team name editing
function editTeam(n) {
  editingTeam = n;
  document.getElementById('modalTitle').textContent = 'Edit ' + (n===1 ? team1Name : team2Name);
  document.getElementById('teamNameInput').value = n===1 ? team1Name : team2Name;
  document.getElementById('teamModal').classList.add('show');
  setTimeout(() => document.getElementById('teamNameInput').focus(), 200);
}

function openTeamEdit() { editTeam(1); }

function saveTeamName() {
  const val = document.getElementById('teamNameInput').value.trim() || (editingTeam===1 ? 'Team 1' : 'Team 2');
  if (editingTeam === 1) team1Name = val;
  else team2Name = val;
  renderTeams(); updateDB();
  closeModal();
}

function closeModal() {
  document.getElementById('teamModal').classList.remove('show');
}

function showOptions() {
  document.getElementById('optionsModal').classList.add('show');
}

function closeOptions() {
  document.getElementById('optionsModal').classList.remove('show');
}

function resetMatch() {
  document.getElementById('confirmModal').classList.add('show');
  closeOptions();
}

function doReset() {
  isRunning = false;
  mainRemaining = QUARTER_DURATION;
  score1 = 0; score2 = 0;
  lastScore1 = 0; lastScore2 = 0;
  foul1 = 0; foul2 = 0;
  currentQuarter = 1;
  team1Name = 'Team 1'; team2Name = 'Team 2';
  document.getElementById('confirmModal').classList.remove('show');
  renderAll();
  try { localStorage.removeItem('bbGame2'); } catch(e) {}
  updateDB();
}

function renderAll() {
  renderTimer();
  renderQuarter();
  renderScores();
  renderFouls();
  renderTeams();
  updatePlayBtn();
}

// Close modals on overlay click
document.getElementById('teamModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('optionsModal').addEventListener('click', function(e) {
  if (e.target === this) closeOptions();
});

// Save team name on Enter
document.getElementById('teamNameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveTeamName();
});

// Init
renderAll();
</script>
</body>
</html>
