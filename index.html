<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Basketball Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Rajdhani',sans-serif; }
.board { width:100vw; height:100vh; background:#000; display:flex; flex-direction:column; }

/* TOP BAR */
.top-bar { display:flex; align-items:center; padding:6px 10px; gap:8px; }
.shot-clock-display {
  font-family:'Orbitron',monospace; font-size:clamp(22px,6vw,44px); font-weight:900;
  color:#e8c000; text-shadow:0 0 12px #e8c00066; letter-spacing:2px; min-width:90px;
  cursor:pointer; border:2px dashed #e8c00044; border-radius:8px; padding:2px 6px;
}
.shot-clock-display.running { color:#ff8800; text-shadow:0 0 18px #ff880099; border-color:#ff880044; }
.shot-clock-display.danger  { color:#ff2200; text-shadow:0 0 20px #ff220099; border-color:#ff220066; animation: blink .4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

.top-center { flex:1; display:flex; align-items:center; justify-content:center; gap:12px; }
.play-btn {
  width:48px; height:48px; border-radius:50%; background:#fff; border:3px solid #fff;
  display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; flex-shrink:0;
}
.play-btn:active { transform:scale(.92); }
.main-clock {
  font-family:'Orbitron',monospace; font-size:clamp(30px,8vw,58px); font-weight:900;
  color:#ff2200; text-shadow:0 0 18px #ff220066; letter-spacing:4px; line-height:1;
}
.quarter-label { font-family:'Rajdhani',sans-serif; font-size:clamp(18px,5vw,30px); font-weight:700; color:#fff; min-width:36px; }
.top-right { display:flex; gap:6px; align-items:center; }
.icon-btn {
  width:44px; height:44px; border-radius:50%; background:#fff; border:none;
  display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; flex-shrink:0;
}
.icon-btn:active { transform:scale(.92); }
.bravo-btn {
  width:44px; height:44px; border-radius:50%;
  background:linear-gradient(135deg,#ff6600,#ffcc00); border:none;
  display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px;
  box-shadow:0 0 12px #ff660088; animation:pulse-bravo 2s infinite;
}
.bravo-btn:active { transform:scale(.88); }
@keyframes pulse-bravo { 0%,100%{box-shadow:0 0 10px #ff660066} 50%{box-shadow:0 0 22px #ff6600cc} }

/* MAIN CONTENT */
.main-content { flex:1; display:flex; align-items:stretch; min-height:0; padding:0 4px; gap:4px; }
.left-col,.right-col { display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:4px 0; }
.score-btns { display:flex; flex-direction:column; gap:8px; }
.score-btn {
  width:44px; height:44px; border-radius:50%; background:#fff; border:none;
  color:#000; font-size:15px; font-weight:700; font-family:'Rajdhani',sans-serif;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.score-btn:active { transform:scale(.92); }
.shot-reset-btns { display:flex; gap:5px; }
.shot-reset-btn {
  width:40px; height:40px; border-radius:50%; background:#fff; border:none;
  color:#000; font-size:14px; font-weight:900; font-family:'Orbitron',monospace;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.shot-reset-btn:active { transform:scale(.92); }

/* CENTER */
.center-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:4px 0; min-width:0; }
.teams-row { display:flex; width:100%; justify-content:space-between; align-items:center; flex:1; gap:4px; }
.team-block { display:flex; flex-direction:column; align-items:center; flex:1; }
.team-name-btn { background:transparent; border:none; color:#fff; font-family:'Rajdhani',sans-serif; font-size:clamp(18px,5vw,30px); font-weight:700; cursor:pointer; letter-spacing:2px; }
.team-name-btn:active { opacity:.7; }
.digit-score { font-family:'Orbitron',monospace; font-size:clamp(60px,17vw,130px); font-weight:900; color:#ffee00; line-height:1; letter-spacing:-2px; }

/* FOULS */
.fouls-row { display:flex; width:100%; justify-content:space-between; align-items:center; padding:2px 0; gap:4px; }
.dots-group { display:flex; gap:5px; background:transparent; border:2px solid #666; border-radius:20px; padding:5px 10px; cursor:pointer; align-items:center; }
.dots-group:active { border-color:#aaa; }
.dot-ind { width:11px; height:11px; border-radius:50%; background:#444; flex-shrink:0; transition:background .12s; }
.dot-ind.on { background:#fff; box-shadow:0 0 5px #fff; }
.fouls-center { display:flex; flex-direction:column; align-items:center; gap:2px; }
.fouls-label-row { display:flex; align-items:center; gap:4px; }
.fouls-label { color:#cc0000; font-size:clamp(14px,4vw,20px); font-weight:700; letter-spacing:2px; }
.fouls-arrow-btn { background:none; border:none; cursor:pointer; padding:2px 4px; display:flex; align-items:center; }
.fouls-arrow-btn:active { opacity:.6; }
.arrow-l { width:0; height:0; border-top:9px solid transparent; border-bottom:9px solid transparent; border-right:14px solid #cc0000; display:inline-block; }
.arrow-r { width:0; height:0; border-top:9px solid transparent; border-bottom:9px solid transparent; border-left:14px solid #cc0000; display:inline-block; }
.fouls-nums { display:flex; justify-content:space-between; width:100%; padding:0 6px; }
.foul-num { font-family:'Orbitron',monospace; font-size:clamp(13px,3.5vw,20px); font-weight:900; color:#cc0000; min-width:22px; text-align:center; }

/* SHOT ROW */
.shot-row { display:flex; width:100%; justify-content:center; align-items:center; gap:20px; padding:2px 0 4px; }
.shot-ctrl-btn { width:34px; height:34px; border-radius:50%; background:#fff; border:none; color:#000; font-size:22px; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.shot-ctrl-btn:active { transform:scale(.9); }
.shot-digits { display:flex; align-items:center; gap:6px; }
.shot-digit { font-family:'Orbitron',monospace; font-size:clamp(26px,7vw,52px); font-weight:900; line-height:1; }
.shot-digit.t1 { color:#ffee00; }
.shot-digit.t2 { color:#ff8800; }
.shot-sep { color:#fff; font-size:clamp(20px,5.5vw,38px); font-weight:700; }
.right-bottom-icons { display:flex; flex-direction:column; gap:6px; align-items:center; }
.bottom-bar { display:flex; justify-content:center; padding:4px 0 6px; }
.divider { width:55%; height:3px; background:#fff; border-radius:2px; }
.wake-dot { position:fixed; top:5px; right:5px; width:7px; height:7px; border-radius:50%; background:#00ff44; opacity:.5; z-index:999; }
.wake-dot.off { background:#444; }

/* MODALS */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.82); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal-box { background:#1a1a1a; border:2px solid #fff; border-radius:16px; padding:22px; width:82%; max-width:320px; display:flex; flex-direction:column; gap:12px; }
.modal-box h3 { color:#fff; font-size:20px; text-align:center; }
.modal-input { background:#333; border:1px solid #666; border-radius:8px; color:#fff; font-size:18px; padding:10px; width:100%; text-align:center; font-family:'Rajdhani',sans-serif; -webkit-user-select:auto; user-select:auto; touch-action:auto; }
.modal-btn { background:#fff; color:#000; border:none; border-radius:8px; padding:12px; font-size:16px; font-weight:700; cursor:pointer; font-family:'Rajdhani',sans-serif; }
.confirm-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:200; align-items:center; justify-content:center; flex-direction:column; gap:18px; }
.confirm-modal.show { display:flex; }
.confirm-modal p { color:#fff; font-size:22px; font-weight:700; }
.confirm-btns { display:flex; gap:16px; }
.confirm-yes { background:#e74c3c; color:#fff; border:none; border-radius:10px; padding:14px 28px; font-size:18px; font-weight:700; cursor:pointer; }
.confirm-no  { background:#555; color:#fff; border:none; border-radius:10px; padding:14px 28px; font-size:18px; font-weight:700; cursor:pointer; }

/* EDIT MODAL */
#editModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:300; overflow-y:auto; padding:16px; }
#editModal.show { display:block; }
.edit-container { max-width:480px; margin:0 auto; display:flex; flex-direction:column; gap:14px; padding-bottom:20px; }
.edit-title { color:#ffcc00; font-family:'Orbitron',monospace; font-size:22px; text-align:center; letter-spacing:2px; }
.edit-section { background:#1a1a1a; border:1.5px solid #444; border-radius:14px; padding:14px; display:flex; flex-direction:column; gap:10px; }
.edit-section-title { color:#aaa; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
.edit-row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.edit-label { color:#fff; font-size:16px; font-weight:600; flex:1; }
.edit-val { font-family:'Orbitron',monospace; font-size:20px; font-weight:900; color:#00ff88; min-width:60px; text-align:center; }
.edit-val.yellow { color:#ffee00; }
.edit-stepper { display:flex; gap:8px; align-items:center; }
.step-btn { width:38px; height:38px; border-radius:50%; border:none; font-size:20px; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
.step-btn.minus { background:#c0392b; color:#fff; }
.step-btn.plus  { background:#27ae60; color:#fff; }
.step-btn:active { transform:scale(.88); }
.edit-name-row { display:flex; align-items:center; gap:10px; }
.edit-name-input { background:#333; border:1px solid #666; border-radius:8px; color:#fff; font-size:16px; padding:8px 12px; flex:1; font-family:'Rajdhani',sans-serif; -webkit-user-select:auto; user-select:auto; touch-action:auto; }
.edit-save-btn { width:38px; height:38px; border-radius:50%; background:#2980b9; border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.edit-save-btn:active { transform:scale(.88); }
.edit-close-btn { background:#fff; color:#000; border:none; border-radius:10px; padding:14px; font-size:18px; font-weight:700; cursor:pointer; font-family:'Rajdhani',sans-serif; }
.time-edit-row { display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; }
.time-unit { display:flex; flex-direction:column; align-items:center; gap:4px; }
.time-unit-label { color:#888; font-size:11px; letter-spacing:1px; }
.time-val-display { font-family:'Orbitron',monospace; font-size:28px; font-weight:900; color:#ff2200; min-width:60px; text-align:center; background:#111; border-radius:8px; padding:6px 10px; }
.time-sep { color:#ff2200; font-size:28px; font-weight:900; margin-top:16px; }
.time-steppers { display:flex; gap:6px; }
.quarter-names-bar { display:flex; gap:6px; flex-wrap:wrap; }
.q-name-btn { padding:6px 12px; border-radius:8px; border:2px solid #444; background:#111; color:#888; font-weight:700; font-size:14px; cursor:pointer; }
.q-name-btn.active { border-color:#ffcc00; color:#ffcc00; background:#2a2200; }
.q-name-btn:active { transform:scale(.9); }
</style>
</head>
<body>
<div class="wake-dot off" id="wakeDot"></div>
<div class="board">

  <div class="top-bar">
    <!-- Tap shot clock to pause/resume it independently -->
    <div class="shot-clock-display" id="shotClockTop" onclick="toggleShotClock()">24.0</div>
    <div class="top-center">
      <button class="play-btn" id="playPauseBtn" onclick="toggleTimer()">▶</button>
      <div class="main-clock" id="mainTimer">10:00</div>
      <div class="quarter-label" id="quarterLabel">1st</div>
    </div>
    <div class="top-right">
      <button class="icon-btn" style="background:#ffcc00;" onclick="openEditModal()">✏️</button>
      <button class="bravo-btn" onclick="sendBravo()">🎉</button>
      <button class="icon-btn" onclick="showOptions()">⋯</button>
    </div>
  </div>

  <div class="main-content">
    <div class="left-col">
      <div class="score-btns">
        <button class="score-btn" onclick="addScore(1,1)">+1</button>
        <button class="score-btn" onclick="addScore(1,2)">+2</button>
        <button class="score-btn" onclick="addScore(1,3)">+3</button>
      </div>
      <div class="shot-reset-btns">
        <!-- 14 / 24 reset shot clock AND restart it automatically -->
        <button class="shot-reset-btn" onclick="setShotClock(14)">14</button>
        <button class="shot-reset-btn" onclick="setShotClock(24)">24</button>
      </div>
    </div>

    <div class="center-area">
      <div class="teams-row">
        <div class="team-block">
          <button class="team-name-btn" onclick="editTeam(1)" id="team1Title">Team 1</button>
          <div class="digit-score" id="s1">0</div>
        </div>
        <div>
          <svg width="44" height="54" viewBox="0 0 44 54" fill="none">
            <line x1="4" y1="4" x2="40" y2="50" stroke="white" stroke-width="6" stroke-linecap="round"/>
            <line x1="40" y1="4" x2="4"  y2="50" stroke="white" stroke-width="6" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="team-block">
          <button class="team-name-btn" onclick="editTeam(2)" id="team2Title">Team 2</button>
          <div class="digit-score" id="s2">0</div>
        </div>
      </div>

      <div class="fouls-row">
        <button class="dots-group" onclick="cycleDot(1)">
          <div class="dot-ind" id="d1_1"></div><div class="dot-ind" id="d1_2"></div>
          <div class="dot-ind" id="d1_3"></div><div class="dot-ind" id="d1_4"></div>
        </button>
        <div class="fouls-center">
          <div class="fouls-label-row">
            <button class="fouls-arrow-btn" onclick="subtractFoul(1)"><span class="arrow-l"></span></button>
            <span class="fouls-label">Fouls</span>
            <button class="fouls-arrow-btn" onclick="subtractFoul(2)"><span class="arrow-r"></span></button>
          </div>
          <div class="fouls-nums">
            <span class="foul-num" id="foulNum1">0</span>
            <span class="foul-num" id="foulNum2">0</span>
          </div>
        </div>
        <button class="dots-group" onclick="cycleDot(2)">
          <div class="dot-ind" id="d2_1"></div><div class="dot-ind" id="d2_2"></div>
          <div class="dot-ind" id="d2_3"></div><div class="dot-ind" id="d2_4"></div>
        </button>
      </div>

      <div class="shot-row">
        <button class="shot-ctrl-btn" onclick="addFoul(1)">+</button>
        <div class="shot-digits">
          <div class="shot-digit t1" id="shotD1">0</div>
          <div class="shot-sep">x</div>
          <div class="shot-digit t2" id="shotD2">0</div>
        </div>
        <button class="shot-ctrl-btn" onclick="addFoul(2)">+</button>
      </div>
    </div>

    <div class="right-col">
      <div class="score-btns">
        <button class="score-btn" onclick="addScore(2,1)">+1</button>
        <button class="score-btn" onclick="addScore(2,2)">+2</button>
        <button class="score-btn" onclick="addScore(2,3)">+3</button>
      </div>
      <div class="right-bottom-icons">
        <button class="icon-btn" onclick="resetShotClock()">🔔</button>
        <button class="icon-btn" onclick="undoScore()">↩</button>
      </div>
    </div>
  </div>

  <div class="bottom-bar"><div class="divider"></div></div>
</div>

<!-- TEAM NAME MODAL -->
<div class="modal-overlay" id="teamModal">
  <div class="modal-box">
    <h3 id="modalTitle">Edit Team Name</h3>
    <input type="text" class="modal-input" id="teamNameInput" placeholder="Enter name...">
    <button class="modal-btn" onclick="saveTeamName()">Save</button>
    <button class="modal-btn" style="background:#333;color:#fff;" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- OPTIONS MODAL -->
<div class="modal-overlay" id="optionsModal">
  <div class="modal-box">
    <h3>Options</h3>
    <button class="modal-btn" onclick="prevQuarter();closeOptions()">◀ Prev Quarter</button>
    <button class="modal-btn" onclick="nextQuarter();closeOptions()">Next Quarter ▶</button>
    <button class="modal-btn" onclick="resetQuarterTimer();closeOptions()">Reset Quarter Timer</button>
    <button class="modal-btn" onclick="toggleFullscreen();closeOptions()">⛶ Fullscreen</button>
    <button class="modal-btn" style="background:#e74c3c;color:#fff;" onclick="closeOptions();resetMatch()">Reset Match</button>
    <button class="modal-btn" style="background:#333;color:#fff;" onclick="closeOptions()">Close</button>
  </div>
</div>

<!-- CONFIRM RESET -->
<div class="confirm-modal" id="confirmModal">
  <p>Reset the whole match?</p>
  <div class="confirm-btns">
    <button class="confirm-yes" onclick="doReset()">Yes, Reset</button>
    <button class="confirm-no" onclick="document.getElementById('confirmModal').classList.remove('show')">Cancel</button>
  </div>
</div>

<!-- FULL EDIT MODAL -->
<div id="editModal">
  <div class="edit-container">
    <div class="edit-title">✏️ EDIT MODE</div>
    <div class="edit-section">
      <div class="edit-section-title">⏱ Main Clock</div>
      <div class="time-edit-row">
        <div class="time-unit">
          <div class="time-unit-label">MIN</div>
          <div class="time-steppers"><button class="step-btn minus" onclick="adjustTime('min',-1)">−</button></div>
          <div class="time-val-display" id="editMin">10</div>
          <div class="time-steppers"><button class="step-btn plus" onclick="adjustTime('min',1)">+</button></div>
        </div>
        <div class="time-sep">:</div>
        <div class="time-unit">
          <div class="time-unit-label">SEC</div>
          <div class="time-steppers"><button class="step-btn minus" onclick="adjustTime('sec',-1)">−</button></div>
          <div class="time-val-display" id="editSec">00</div>
          <div class="time-steppers"><button class="step-btn plus" onclick="adjustTime('sec',1)">+</button></div>
        </div>
      </div>
    </div>
    <div class="edit-section">
      <div class="edit-section-title">🟡 Shot Clock (sec)</div>
      <div class="edit-row">
        <div class="edit-label">Shot Clock</div>
        <div class="edit-stepper">
          <button class="step-btn minus" onclick="adjustShotEdit(-1)">−</button>
          <div class="edit-val" id="editShot">24</div>
          <button class="step-btn plus" onclick="adjustShotEdit(1)">+</button>
        </div>
      </div>
    </div>
    <div class="edit-section">
      <div class="edit-section-title">🏀 Quarter</div>
      <div class="quarter-names-bar">
        <button class="q-name-btn" onclick="setQuarterEdit(1)">1st</button>
        <button class="q-name-btn" onclick="setQuarterEdit(2)">2nd</button>
        <button class="q-name-btn" onclick="setQuarterEdit(3)">3rd</button>
        <button class="q-name-btn" onclick="setQuarterEdit(4)">4th</button>
      </div>
    </div>
    <div class="edit-section">
      <div class="edit-section-title">🟡 Team 1</div>
      <div class="edit-name-row">
        <input type="text" class="edit-name-input" id="editName1" placeholder="Team 1 name">
        <button class="edit-save-btn" onclick="saveEditName(1)">✓</button>
      </div>
      <div class="edit-row">
        <div class="edit-label">Score</div>
        <div class="edit-stepper">
          <button class="step-btn minus" onclick="adjustScore(1,-1)">−</button>
          <div class="edit-val yellow" id="editS1">0</div>
          <button class="step-btn plus" onclick="adjustScore(1,1)">+</button>
        </div>
      </div>
      <div class="edit-row">
        <div class="edit-label">Fouls</div>
        <div class="edit-stepper">
          <button class="step-btn minus" onclick="adjustFoulEdit(1,-1)">−</button>
          <div class="edit-val" id="editF1">0</div>
          <button class="step-btn plus" onclick="adjustFoulEdit(1,1)">+</button>
        </div>
      </div>
    </div>
    <div class="edit-section">
      <div class="edit-section-title">🟠 Team 2</div>
      <div class="edit-name-row">
        <input type="text" class="edit-name-input" id="editName2" placeholder="Team 2 name">
        <button class="edit-save-btn" onclick="saveEditName(2)">✓</button>
      </div>
      <div class="edit-row">
        <div class="edit-label">Score</div>
        <div class="edit-stepper">
          <button class="step-btn minus" onclick="adjustScore(2,-1)">−</button>
          <div class="edit-val yellow" id="editS2">0</div>
          <button class="step-btn plus" onclick="adjustScore(2,1)">+</button>
        </div>
      </div>
      <div class="edit-row">
        <div class="edit-label">Fouls</div>
        <div class="edit-stepper">
          <button class="step-btn minus" onclick="adjustFoulEdit(2,-1)">−</button>
          <div class="edit-val" id="editF2">0</div>
          <button class="step-btn plus" onclick="adjustFoulEdit(2,1)">+</button>
        </div>
      </div>
    </div>
    <button class="edit-close-btn" onclick="closeEditModal()">✅ Done — Close Edit</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
/* prevent zoom */
document.addEventListener('touchmove',e=>{if(e.scale!==1)e.preventDefault();},{passive:false});
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});
let _lte=0;
document.addEventListener('touchend',e=>{const n=Date.now();if(n-_lte<=300)e.preventDefault();_lte=n;},false);
document.addEventListener('touchstart',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});

/* Firebase */

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const QUARTER_NAMES=['1st','2nd','3rd','4th'];
const QUARTER_DURATION=600;

function load(){try{const s=localStorage.getItem('bbScore');return s?JSON.parse(s):{}}catch(e){return{}}}
const sv=load();

let score1=sv.score1??0, score2=sv.score2??0;
let foul1=sv.foul1??0,   foul2=sv.foul2??0;
let dots1=sv.dots1??0,   dots2=sv.dots2??0;
let currentQuarter=sv.currentQuarter??1;
let team1Name=sv.team1Name??'Team 1', team2Name=sv.team2Name??'Team 2';
let mainRemaining=sv.mainRemaining??QUARTER_DURATION;
let shotSecs=sv.shotSecs??24, shotTenths=sv.shotTenths??0;
let lastScore1=score1, lastScore2=score2, editingTeam=0;

/* Timer state */
let mainRunning=false, shotRunning=false;
let mainInterval=null, shotInterval=null;

function save(){
  try{localStorage.setItem('bbScore',JSON.stringify({
    score1,score2,foul1,foul2,dots1,dots2,
    currentQuarter,team1Name,team2Name,mainRemaining,shotSecs,shotTenths
  }));}catch(e){}
}

/* Wake lock */
let wakeLock=null;
async function requestWakeLock(){
  if('wakeLock' in navigator){
    try{
      wakeLock=await navigator.wakeLock.request('screen');
      document.getElementById('wakeDot').classList.remove('off');
      wakeLock.addEventListener('release',()=>document.getElementById('wakeDot').classList.add('off'));
    }catch(e){}
  }
}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')requestWakeLock();});
requestWakeLock();

function toggleFullscreen(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();
  else document.exitFullscreen&&document.exitFullscreen();
}

/* ── RENDER ── */
function renderAll(){
  document.getElementById('s1').textContent=score1;
  document.getElementById('s2').textContent=score2;
  document.getElementById('team1Title').textContent=team1Name;
  document.getElementById('team2Title').textContent=team2Name;
  document.getElementById('quarterLabel').textContent=QUARTER_NAMES[(currentQuarter-1)%4];
  document.getElementById('foulNum1').textContent=foul1;
  document.getElementById('foulNum2').textContent=foul2;
  document.getElementById('shotD1').textContent=foul1;
  document.getElementById('shotD2').textContent=foul2;
  for(let i=1;i<=4;i++){
    document.getElementById('d1_'+i).classList.toggle('on',i<=dots1);
    document.getElementById('d2_'+i).classList.toggle('on',i<=dots2);
  }
  renderMain(); renderShot();
}
function renderMain(){
  const m=Math.floor(mainRemaining/60), s=mainRemaining%60;
  document.getElementById('mainTimer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function renderShot(){
  const el=document.getElementById('shotClockTop');
  el.textContent=String(shotSecs).padStart(2,'0')+'.'+shotTenths;
  el.className='shot-clock-display'+(shotRunning&&shotSecs>=5?' running':shotRunning&&shotSecs<5?' danger':'');
}

/* ── MAIN CLOCK ── */
function toggleTimer(){
  if(mainRunning){
    pauseAll();
    document.getElementById('playPauseBtn').textContent='▶';
  } else {
    startAll();
    document.getElementById('playPauseBtn').textContent='⏸';
  }
}
function startAll(){
  startMainClock();
  startShotClock();
}
function pauseAll(){
  stopMainClock();
  stopShotClock();
}
function startMainClock(){
  if(mainRunning)return;
  mainRunning=true;
  mainInterval=setInterval(()=>{
    if(mainRemaining<=0){
      stopMainClock(); stopShotClock();
      document.getElementById('playPauseBtn').textContent='▶';
      save(); pushFirebaseTimer(); return;
    }
    mainRemaining--;
    renderMain();
    pushFirebaseTimer(); // push every second
  },1000);
}
function stopMainClock(){
  mainRunning=false;
  clearInterval(mainInterval); mainInterval=null;
  save();
}
function resetQuarterTimer(){
  stopMainClock(); stopShotClock();
  document.getElementById('playPauseBtn').textContent='▶';
  mainRemaining=QUARTER_DURATION;
  shotSecs=24; shotTenths=0;
  renderAll(); save(); pushFirebaseTimer();
}

/* ── SHOT CLOCK ── */
function toggleShotClock(){
  if(shotRunning)stopShotClock();
  else startShotClock();
}
function startShotClock(){
  if(shotRunning)return;
  if(shotSecs<=0&&shotTenths<=0)return;
  shotRunning=true;
  renderShot();
  shotInterval=setInterval(()=>{
    if(shotTenths===0){
      if(shotSecs===0){
        stopShotClock();
        renderShot(); pushFirebaseTimer(); return;
      }
      shotSecs--; shotTenths=9;
    } else {
      shotTenths--;
    }
    renderShot();
    if(shotTenths===0) pushFirebaseTimer(); // push each full second
  },100);
}
function stopShotClock(){
  shotRunning=false;
  clearInterval(shotInterval); shotInterval=null;
  renderShot(); save();
}

/* Reset shot clock to val — ALWAYS restart it (14/24 buttons) */
function setShotClock(val){
  stopShotClock();
  shotSecs=val; shotTenths=0;
  renderShot();
  // Start shot clock immediately when 14/24 pressed, whether main is running or not
  startShotClock();
  // If main clock was NOT running, also start it
  if(!mainRunning){
    startMainClock();
    document.getElementById('playPauseBtn').textContent='⏸';
  }
  save(); pushFirebaseTimer();
}
function resetShotClock(){setShotClock(24);}

/* ── QUARTER ── */
function nextQuarter(){if(currentQuarter<4)currentQuarter++;resetQuarterTimer();renderAll();pushFirebase();}
function prevQuarter(){if(currentQuarter>1)currentQuarter--;resetQuarterTimer();renderAll();pushFirebase();}

/* ── SCORE ── */
function addScore(team,pts){
  if(team===1){lastScore1=score1;score1+=pts;}
  else        {lastScore2=score2;score2+=pts;}
  renderAll();save();pushFirebase();
}
function undoScore(){score1=lastScore1;score2=lastScore2;renderAll();save();pushFirebase();}

/* ── FOULS ── */
function addFoul(team)     {if(team===1)foul1++;else foul2++;renderAll();save();}
function subtractFoul(team){if(team===1)foul1=Math.max(0,foul1-1);else foul2=Math.max(0,foul2-1);renderAll();save();}

/* ── DOTS ── */
function cycleDot(team){
  if(team===1)dots1=dots1>=4?0:dots1+1;
  else        dots2=dots2>=4?0:dots2+1;
  renderAll();save();
}

/* ── RESET ── */
function resetMatch(){document.getElementById('confirmModal').classList.add('show');}
function doReset(){
  document.getElementById('confirmModal').classList.remove('show');
  score1=score2=foul1=foul2=dots1=dots2=0;
  lastScore1=lastScore2=0; currentQuarter=1;
  stopMainClock();stopShotClock();
  document.getElementById('playPauseBtn').textContent='▶';
  mainRemaining=QUARTER_DURATION; shotSecs=24; shotTenths=0;
  renderAll();save();pushFirebase();pushFirebaseTimer();
}

/* ── TEAM MODAL ── */
function editTeam(t){
  editingTeam=t;
  document.getElementById('modalTitle').textContent='Edit '+(t===1?team1Name:team2Name);
  document.getElementById('teamNameInput').value=t===1?team1Name:team2Name;
  document.getElementById('teamModal').classList.add('show');
  setTimeout(()=>document.getElementById('teamNameInput').focus(),100);
}
function saveTeamName(){
  const val=document.getElementById('teamNameInput').value.trim();
  if(val){if(editingTeam===1)team1Name=val;else team2Name=val;}
  closeModal();renderAll();save();pushFirebase();
}
function closeModal(){document.getElementById('teamModal').classList.remove('show');}

/* ── OPTIONS ── */
function showOptions() {document.getElementById('optionsModal').classList.add('show');}
function closeOptions(){document.getElementById('optionsModal').classList.remove('show');}

/* ── FULL EDIT MODAL ── */
function openEditModal(){
  const m=Math.floor(mainRemaining/60),s=mainRemaining%60;
  document.getElementById('editMin').textContent=String(m).padStart(2,'0');
  document.getElementById('editSec').textContent=String(s).padStart(2,'0');
  document.getElementById('editShot').textContent=shotSecs;
  document.getElementById('editS1').textContent=score1;
  document.getElementById('editS2').textContent=score2;
  document.getElementById('editF1').textContent=foul1;
  document.getElementById('editF2').textContent=foul2;
  document.getElementById('editName1').value=team1Name;
  document.getElementById('editName2').value=team2Name;
  document.querySelectorAll('.q-name-btn').forEach((btn,i)=>btn.classList.toggle('active',i+1===currentQuarter));
  document.getElementById('editModal').classList.add('show');
}
function closeEditModal(){
  document.getElementById('editModal').classList.remove('show');
  renderAll();save();pushFirebase();pushFirebaseTimer();
}
function adjustTime(unit,delta){
  let m=parseInt(document.getElementById('editMin').textContent)||0;
  let s=parseInt(document.getElementById('editSec').textContent)||0;
  if(unit==='min')m=Math.max(0,Math.min(59,m+delta));
  if(unit==='sec')s=Math.max(0,Math.min(59,s+delta));
  mainRemaining=m*60+s;
  document.getElementById('editMin').textContent=String(m).padStart(2,'0');
  document.getElementById('editSec').textContent=String(s).padStart(2,'0');
  renderMain();
}
function adjustShotEdit(delta){
  stopShotClock();
  shotSecs=Math.max(0,Math.min(60,shotSecs+delta)); shotTenths=0;
  document.getElementById('editShot').textContent=shotSecs;
  renderShot();
}
function setQuarterEdit(q){
  currentQuarter=q;
  document.querySelectorAll('.q-name-btn').forEach((btn,i)=>btn.classList.toggle('active',i+1===q));
  document.getElementById('quarterLabel').textContent=QUARTER_NAMES[(q-1)%4];
}
function adjustScore(team,delta){
  if(team===1){score1=Math.max(0,score1+delta);document.getElementById('editS1').textContent=score1;document.getElementById('s1').textContent=score1;}
  else        {score2=Math.max(0,score2+delta);document.getElementById('editS2').textContent=score2;document.getElementById('s2').textContent=score2;}
}
function adjustFoulEdit(team,delta){
  if(team===1){foul1=Math.max(0,foul1+delta);document.getElementById('editF1').textContent=foul1;}
  else        {foul2=Math.max(0,foul2+delta);document.getElementById('editF2').textContent=foul2;}
  document.getElementById('foulNum1').textContent=foul1;
  document.getElementById('foulNum2').textContent=foul2;
  document.getElementById('shotD1').textContent=foul1;
  document.getElementById('shotD2').textContent=foul2;
}
function saveEditName(team){
  const val=document.getElementById('editName'+team).value.trim();
  if(val){
    if(team===1){team1Name=val;document.getElementById('team1Title').textContent=val;}
    else        {team2Name=val;document.getElementById('team2Title').textContent=val;}
  }
}

/* ── BRAVO ── */
function sendBravo(){
  db.ref('bravo').set({ts:Date.now(),active:true});
  const btn=document.querySelector('.bravo-btn');
  btn.style.transform='scale(1.3)'; btn.textContent='🎊';
  setTimeout(()=>{btn.style.transform='';btn.textContent='🎉';db.ref('bravo').set({ts:Date.now(),active:false});},4000);
}

/* ── FIREBASE ── */
function pushFirebase(){
  try{db.ref('scoreboard').set({score1,score2,team1Name,team2Name,quarter:currentQuarter,ts:Date.now()});}catch(e){}
}
function pushFirebaseTimer(){
  try{
    db.ref('game').set({
      main:mainRemaining,
      shot:shotSecs,
      shotTenths:shotTenths,
      team1:score1, team2:score2,
      fouls1:foul1, fouls2:foul2,
      mainRunning:mainRunning,
      shotRunning:shotRunning,
      ts:Date.now()
    });
  }catch(e){}
}

renderAll();
</script>
